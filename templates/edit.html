<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <h1>Edit Task</h1>

    <form method="POST">

        <label>Title</label>

        <input
            type="text"
            name="title"
            value="{{ task.title }}"
            required>

        <label>Description</label>

        <textarea
            name="description"
            rows="5"
            required>{{ task.description }}</textarea>

        <button type="submit">
            Update Task
        </button>

    </form>

</body>

</html>
